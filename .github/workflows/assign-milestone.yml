name: Assign milestone to new issues

on:
  issues:
    types: [opened]

jobs:
  assign-milestone:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Assign latest open milestone by semver
        uses: actions/github-script@v7
        with:
          script: |
            const milestones = await github.rest.issues.listMilestones({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            if (milestones.data.length === 0) {
              console.log('No open milestones found, skipping.');
              return;
            }

            const semverRegex = /(\d+)\.(\d+)\.(\d+)/;
            const versioned = milestones.data
              .map(m => ({ ...m, match: semverRegex.exec(m.title) }))
              .filter(m => m.match !== null)
              .sort((a, b) => {
                const [, aMaj, aMin, aPatch] = a.match.map(Number);
                const [, bMaj, bMin, bPatch] = b.match.map(Number);
                if (bMaj !== aMaj) return bMaj - aMaj;
                if (bMin !== aMin) return bMin - aMin;
                return bPatch - aPatch;
              });

            if (versioned.length === 0) {
              console.log('No semver-titled milestones found, skipping.');
              return;
            }

            const latest = versioned[0];
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              milestone: latest.number,
            });

            console.log(`Assigned milestone: ${latest.title} (#${latest.number})`);
