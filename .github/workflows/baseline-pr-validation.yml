name: PR Validation

on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  repo-files:
    name: repo-files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check required repository files
        shell: bash
        run: |
          required=(README.md LICENSE .gitignore .editorconfig .gitattributes CHANGELOG.md)
          missing=()

          for file in "${required[@]}"; do
            if [[ ! -f "$file" ]]; then
              missing+=("$file")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            echo "Missing required repository files:"
            printf ' - %s\n' "${missing[@]}"
            exit 1
          fi

  pr-title:
    name: pr-title
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        shell: bash
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          pattern='^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([^)]+\))?: .+'

          if [[ ! "$PR_TITLE" =~ $pattern ]]; then
            echo "PR title must follow Conventional Commits."
            echo "Expected example: docs(repo): add minimal repository scaffold"
            echo "Received: $PR_TITLE"
            exit 1
          fi

  markdown-docs:
    name: markdown-docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate markdown files
        shell: bash
        run: |
          mapfile -t files < <(git ls-files '*.md')

          if (( ${#files[@]} == 0 )); then
            echo "No markdown files found."
            exit 0
          fi

          empty=()
          unbalanced=()

          for file in "${files[@]}"; do
            if [[ ! -s "$file" ]]; then
              empty+=("$file")
              continue
            fi

            fence_count=$(grep -c '^```' "$file" || true)
            if (( fence_count % 2 != 0 )); then
              unbalanced+=("$file")
            fi
          done

          if (( ${#empty[@]} > 0 )); then
            echo "Empty markdown files detected:"
            printf ' - %s\n' "${empty[@]}"
            exit 1
          fi

          if (( ${#unbalanced[@]} > 0 )); then
            echo "Markdown files with unbalanced code fences detected:"
            printf ' - %s\n' "${unbalanced[@]}"
            exit 1
          fi

  install:
    name: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Verify lockfile-based install
        shell: bash
        run: npm ci

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        shell: bash
        run: npm ci

      - name: Run typecheck
        shell: bash
        run: npm run typecheck

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        shell: bash
        run: npm ci

      - name: Build application
        shell: bash
        run: npm run build

  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        shell: bash
        run: npm ci

      - name: Run unit test suite
        shell: bash
        run: npm run test:unit

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: wshka
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d wshka"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/wshka
      DATABASE_SSL: "false"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        shell: bash
        run: npm ci

      - name: Run database migrations
        shell: bash
        run: npm run db:migrate

      - name: Install Playwright browser
        shell: bash
        run: npx playwright install --with-deps chromium

      - name: Run e2e test suite
        shell: bash
        run: npm run test:e2e
